name: Deploy to Azure VM

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Repository variable (Settings → Secrets and variables → Actions → Variables), not a secret.
          WEB_NEXT_PUBLIC_API_URL: ${{ vars.WEB_NEXT_PUBLIC_API_URL }}
        with:
          host: ${{ secrets.AZ_VM_HOST }}
          username: ${{ secrets.AZ_VM_USER }}
          key: ${{ secrets.AZ_VM_SSH_KEY }}
          # `env` above is on the runner; `envs` forwards these names into the remote shell (see appleboy/ssh-action).
          envs: JWT_SECRET,WEB_NEXT_PUBLIC_API_URL
          script_stop: true
          script: |
            set -e
            export JWT_SECRET
            export WEB_NEXT_PUBLIC_API_URL

            if [ -z "$JWT_SECRET" ] || [ "${#JWT_SECRET}" -lt 32 ]; then
              echo "JWT_SECRET must be set (GitHub secret) and at least 32 characters (see auth.service.ts)."
              exit 1
            fi

            if [ -z "$WEB_NEXT_PUBLIC_API_URL" ]; then
              echo "WEB_NEXT_PUBLIC_API_URL must be set (GitHub Actions repository variable) to the public API URL, e.g. http://YOUR_VM_IP:3001"
              echo "See docker-compose.yml web.build.args and docker/web/Dockerfile NEXT_PUBLIC_API_URL."
              exit 1
            fi

            APP_DIR="${{ secrets.AZ_VM_APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "Missing required secret: AZ_VM_APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout master
            git reset --hard origin/master

            # Add detailed debugging here
            echo "Current directory: $(pwd)"
            echo "Listing contents:"
            ls -la
            echo "Checking if apps/api exists:"
            ls -ld apps/api 2>&1 || echo "apps/api does not exist yet"

            # docker-compose reads apps/api/.env — merge JWT from GitHub (file is gitignored on the VM).
            ENV_FILE="apps/api/.env"
            echo "Creating ENV_FILE at: $ENV_FILE"
            mkdir -p apps/api || { echo "ERROR: mkdir -p apps/api failed"; exit 1; }
            touch "$ENV_FILE" || { echo "ERROR: touch $ENV_FILE failed"; exit 1; }

            if grep -q '^JWT_SECRET=' "$ENV_FILE" 2>/dev/null; then
              echo "Removing existing JWT_SECRET from $ENV_FILE"
              grep -v '^JWT_SECRET=' "$ENV_FILE" >"${ENV_FILE}.tmp" || { echo "ERROR: grep -v failed"; exit 1; }
              mv "${ENV_FILE}.tmp" "$ENV_FILE" || { echo "ERROR: mv failed"; exit 1; }
            fi

            echo "Adding JWT_SECRET to $ENV_FILE"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >>"$ENV_FILE" || { echo "ERROR: printf to $ENV_FILE failed"; exit 1; }
            chmod 600 "$ENV_FILE" || true

            echo "ENV_FILE contents:"
            cat "$ENV_FILE"

            docker compose up -d --build --remove-orphans
            docker compose ps

            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3001/api/health/db >/dev/null; then
                echo "API health check passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "API health check failed after retries."
                docker compose logs --tail=200 api
                exit 1
              fi
              sleep 2
            done

            for i in $(seq 1 30); do
              if curl -fsS http://localhost:3000 >/dev/null; then
                echo "Web health check passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Web health check failed after retries."
                docker compose logs --tail=200 web
                exit 1
              fi
              sleep 2
            done

            echo "Deployment and smoke checks succeeded."
