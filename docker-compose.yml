services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: marketplace-postgres:18-alpine
    restart: unless-stopped
    # Host 5433 avoids clashing with a local Postgres already on 5432.
    # Inside Docker/SERVICE DNS the DB still listens on port 5432.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      # Postgres 18+ images expect the mount at /var/lib/postgresql (not .../data); PGDATA lives in a versioned subdirectory.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: marketplace-api:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    # JWT_SECRET, JWT_EXPIRES_IN, CORS_ORIGIN, etc. — see apps/api/.env.example
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://marketplace:marketplace@postgres:5432/marketplace?schema=public
      # Optional: allow Next.js dev origin when hitting API from the host browser.
      # CORS_ORIGIN: "http://localhost:3000"

    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    image: marketplace-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Server-side BFF routes (e.g. POST /api/auth/login) must use the Compose service name —
      # inside this container localhost:3001 is not the API. NEXT_PUBLIC_API_URL stays
      # http://localhost:3001 for the browser on the host.
      API_BASE_URL: http://api:3001
    depends_on:
      - api

volumes:
  postgres_data:
